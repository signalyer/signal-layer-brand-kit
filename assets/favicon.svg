<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(172, 72%, 42%)"/>
      <stop offset="100%" stop-color="hsl(200, 85%, 52%)"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#grid)"/>
  <text x="32" y="44" text-anchor="middle"
        font-family="Syne, system-ui, -apple-system, sans-serif"
        font-weight="800" font-size="28"
        fill="hsl(222, 28%, 5%)" letter-spacing="-1">SL</text>
</svg>
